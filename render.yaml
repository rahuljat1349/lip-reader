services:
  - type: web
    name: lip-reader-api
    runtime: python
    rootDir: backend
    buildCommand: bash setup_avhubert.sh && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: LIPREADER_CORS_ORIGINS
        value: http://localhost:3000,https://your-frontend-domain.vercel.app
